#==============================================================================
# This file defines the default configuration for SYCRONIX.
# User customizations are stored in ~/.config/sycronix/sycronix.conf
#==============================================================================

#--- General Settings ---
SYCRONIX_THEME="cyber"
SYCRONIX_BANNER="default"
SYCRONIX_PROMPT_STYLE="cyber"
SYCRONIX_AUTO_UPDATE="false"

#--- Display Settings ---
SYCRONIX_SHOW_DASHBOARD="true"
SYCRONIX_SHOW_BANNER="true"
SYCRONIX_SHOW_USER="true"
SYCRONIX_SHOW_DEVICE="true"
SYCRONIX_SHOW_ANDROID="true"
SYCRONIX_SHOW_KERNEL="true"
SYCRONIX_SHOW_SHELL="true"
SYCRONIX_SHOW_DATETIME="true"
SYCRONIX_SHOW_BATTERY="true"
SYCRONIX_SHOW_IP="false"
SYCRONIX_SHOW_UPTIME="true"

#--- Prompt Settings ---
SYCRONIX_PROMPT_MULTILINE="true"
SYCRONIX_PROMPT_SHOW_GIT="true"
SYCRONIX_PROMPT_SHOW_EXIT_CODE="true"
SYCRONIX_PROMPT_SHOW_ROOT="true"
SYCRONIX_PROMPT_SHOW_USERNAME="true"
SYCRONIX_PROMPT_SHOW_DIR="true"
SYCRONIX_PROMPT_SHOW_TIME="false"

#--- Color Settings (Hex) ---
SYCRONIX_COLOR_PRIMARY="#00ffcc"
SYCRONIX_COLOR_SECONDARY="#ff00ff"
SYCRONIX_COLOR_ACCENT="#ffff00"
SYCRONIX_COLOR_SUCCESS="#00ff00"
SYCRONIX_COLOR_ERROR="#ff0044"
SYCRONIX_COLOR_TEXT="#ffffff"
SYCRONIX_COLOR_DIM="#666666"

#--- Paths ---
SYCRONIX_DIR="${HOME}/.config/sycronix"
SYCRONIX_PLUGIN_DIR="${SYCRONIX_DIR}/plugins"
SYCRONIX_THEME_DIR="${SYCRONIX_DIR}/themes"
SYCRONIX_BANNER_DIR="${SYCRONIX_DIR}/banners"
SYCRONIX_PROMPT_DIR="${SYCRONIX_DIR}/prompts"
SYCRONIX_CACHE_DIR="${SYCRONIX_DIR}/cache"
